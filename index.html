<!doctype html>
<!--
  DistyVault index.html — Application shell and loader
  No-build, CDN-based architecture for maximum portability and client-side privacy.
-->
<html lang="en" class="h-full">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DistyVault</title>
  <meta name="description" content="Gather, distill and control your knowledge" />
  <script>
    // Silence non-production CDN warnings (Tailwind/Babel) to keep the console clean
    (function () {
      const log = console.log, warn = console.warn, info = console.info;
      const isSlop = (m) => typeof m === 'string' && (m.includes('tailwindcss.com') || m.includes('Babel'));
      console.log = (...a) => isSlop(a[0]) ? null : log(...a);
      console.warn = (...a) => isSlop(a[0]) ? null : warn(...a);
      console.info = (...a) => isSlop(a[0]) ? null : info(...a);
    })();
  </script>
  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- TailwindCSS via CDN (dark mode via 'class') -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'] }
        }
      },
      darkMode: 'class'
    }
  </script>

  <!-- Icons for light and dark schemes -->
  <link rel="icon" href="logos/logo_no_bg_b.png" media="(prefers-color-scheme: light)" type="image/png" />
  <link rel="icon" href="logos/logo_no_bg_w.png" media="(prefers-color-scheme: dark)" type="image/png" />
  <link rel="apple-touch-icon" href="logos/logo_no_bg_b.png" media="(prefers-color-scheme: light)" />
  <link rel="apple-touch-icon" href="logos/logo_no_bg_w.png" media="(prefers-color-scheme: dark)" />

  <!-- React 18 Production Build (Minified) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Utilities shared across modules -->
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- Icons: lucide preferred, feather as fallback -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>

  <style>
    html, body, #root { height: 100%; }
    .theme-transition * { transition: none; }
    input::placeholder { color: #94a3b8; opacity: 1; }
    .dark input::placeholder { color: #64748b; }
    input[type="range"] { accent-color: #18181b; }
    .dark input[type="range"] { accent-color: #e4e4e7; }
    .dv-icon svg { color: currentColor; stroke: currentColor; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    kbd { font-family: inherit; }

    /* Reader typography */
    .dv-reader-body h1 { font-size: 1.75em; font-weight: 700; margin: 1.5em 0 0.6em; line-height: 1.25; color: #0f172a; }
    .dv-reader-body h2 { font-size: 1.35em; font-weight: 600; margin: 1.4em 0 0.5em; line-height: 1.3; color: #0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3em; }
    .dv-reader-body h3 { font-size: 1.15em; font-weight: 600; margin: 1.2em 0 0.4em; color: #0f172a; }
    .dv-reader-body h4 { font-size: 1em; font-weight: 600; margin: 1em 0 0.3em; color: #334155; }
    .dv-reader-body p { margin: 0.7em 0; color: #334155; }
    .dv-reader-body ul, .dv-reader-body ol { margin: 0.6em 0; padding-left: 1.5em; }
    .dv-reader-body li { margin: 0.25em 0; color: #334155; }
    .dv-reader-body li::marker { color: #94a3b8; }
    .dv-reader-body blockquote { border-left: 3px solid #cbd5e1; padding: 0.5em 1em; margin: 1em 0; color: #64748b; font-style: italic; background: #f8fafc; border-radius: 0 6px 6px 0; }
    .dv-reader-body code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.875em; background: #f1f5f9; padding: 0.15em 0.4em; border-radius: 4px; color: #1e293b; }
    .dv-reader-body pre { background: #f1f5f9; padding: 1em; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
    .dv-reader-body pre code { background: none; padding: 0; }
    .dv-reader-body a { color: #475569; text-decoration: underline; text-underline-offset: 2px; }
    .dv-reader-body a:hover { color: #0f172a; }
    .dv-reader-body hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.5em 0; }
    .dv-reader-body strong { font-weight: 600; color: #0f172a; }
    .dv-reader-body table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.9em; }
    .dv-reader-body th, .dv-reader-body td { border: 1px solid #e2e8f0; padding: 0.5em 0.75em; text-align: left; }
    .dv-reader-body th { background: #f8fafc; font-weight: 600; color: #0f172a; }

    /* Dark mode reader */
    .dark .dv-reader-body h1, .dark .dv-reader-body h2, .dark .dv-reader-body h3, .dark .dv-reader-body strong { color: #f1f5f9; }
    .dark .dv-reader-body h2 { border-bottom-color: rgba(255,255,255,0.05); }
    .dark .dv-reader-body h4 { color: #cbd5e1; }
    .dark .dv-reader-body p, .dark .dv-reader-body li { color: #cbd5e1; }
    .dark .dv-reader-body li::marker { color: #475569; }
    .dark .dv-reader-body blockquote { border-left-color: #334155; color: #94a3b8; background: rgba(255,255,255,0.02); }
    .dark .dv-reader-body code { background: rgba(255,255,255,0.05); color: #e2e8f0; }
    .dark .dv-reader-body pre { background: rgba(255,255,255,0.03); }
    .dark .dv-reader-body a { color: #94a3b8; }
    .dark .dv-reader-body a:hover { color: #e2e8f0; }
    .dark .dv-reader-body hr { border-top-color: rgba(255,255,255,0.05); }
    .dark .dv-reader-body th, .dark .dv-reader-body td { border-color: rgba(255,255,255,0.05); }
    .dark .dv-reader-body th { background: rgba(255,255,255,0.03); color: #f1f5f9; }
  </style>
  <script>
      // Polyfill requestIdleCallback/cancelIdleCallback when missing
      (function () {
        if (typeof window !== 'undefined') {
          if (!('requestIdleCallback' in window)) {
            window.requestIdleCallback = function (cb, opts) {
              const start = Date.now();
              return setTimeout(function () {
                cb({ didTimeout: false, timeRemaining: function () { return Math.max(0, 50 - (Date.now() - start)); } });
              }, (opts && opts.timeout) || 1);
            };
          }
          if (!('cancelIdleCallback' in window)) {
            window.cancelIdleCallback = function (id) { clearTimeout(id); };
          }
        }
      })();
  </script>
  <script>
    // Initialize theme from persisted preference and keep in sync with system preference
    (function () {
      try {
        const pref = localStorage.getItem('dv.theme') || 'system';
        const isDark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', isDark);
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        function onChange() {
          try {
            const prefNow = localStorage.getItem('dv.theme') || 'system';
            if (prefNow !== 'system') return;
            const darkNow = mq.matches;
            document.documentElement.classList.toggle('dark', darkNow);
            const msg = { type: 'dv-theme', isDark: darkNow };
            document.querySelectorAll('iframe').forEach(fr => { try { fr.contentWindow && fr.contentWindow.postMessage(msg, '*'); } catch { } });
            window.postMessage(msg, '*');
          } catch { }
        }
        if (mq && mq.addEventListener) mq.addEventListener('change', onChange);
        else if (mq && mq.addListener) mq.addListener(onChange);
      } catch { }
    })();
    // Bump DV version when coordinating breaking changes across modules
    window.DV = { version: '0.2.0' };
  </script>
</head>

<body class="bg-white text-slate-900 dark:bg-zinc-950 dark:text-slate-100">
  <div id="root"></div>

  <!-- Core modules: utils → bus → toast → db → queue (order matters) -->
  <script type="text/babel" src="src/core/utils.js"></script>
  <script type="text/babel" src="src/core/eventBus.js"></script>
  <script type="text/babel" src="src/core/toast.js"></script>
  <script type="text/babel" src="src/core/db.js"></script>
  <script type="text/babel" src="src/core/queue.js"></script>

  <!-- AI providers then orchestrator -->
  <script type="text/babel" src="src/ai/providers/openai.js"></script>
  <script type="text/babel" src="src/ai/providers/gemini.js"></script>
  <script type="text/babel" src="src/ai/providers/anthropic.js"></script>
  <script type="text/babel" src="src/ai/providers/deepseek.js"></script>
  <script type="text/babel" src="src/ai/providers/grok.js"></script>
  <script type="text/babel" src="src/ai/service.js"></script>

  <!-- Extractors: files → url → youtube → dispatcher -->
  <script type="text/babel" src="src/extractors/files.js"></script>
  <script type="text/babel" src="src/extractors/url.js"></script>
  <script type="text/babel" src="src/extractors/youtube.js"></script>
  <script type="text/babel" src="src/extractors/index.js"></script>

  <!-- App should load last so all DV modules are available -->
  <script type="text/babel" src="src/App.jsx"></script>
  <script>
    // Initialize icons on DOM ready; components also request replacements on-demand
    document.addEventListener('DOMContentLoaded', function () {
      if (window.lucide && window.lucide.createIcons) {
        window.lucide.createIcons();
      }
    });
  </script>
</body>

</html>
